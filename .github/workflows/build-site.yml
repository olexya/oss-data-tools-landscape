name: Build & Deploy Site

on:
  push:
    branches: [main, master]
    paths:
      - '01.ingestion_and_transport.md'
      - '02.storage.md'
      - '03.query_and_processing.md'
      - '04.analysis_and_output.md'
      - '05.platform_management.md'
      - 'docs/**'
      - '.github/workflows/build-site.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate data.json / meta.json from catalogues
        run: node docs/build-data.mjs "$(date +%d/%m/%Y)"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
