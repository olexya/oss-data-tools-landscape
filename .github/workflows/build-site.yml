name: Build & Deploy Site

on:
  push:
    branches: [main, master]
    paths:
      - '**.md'
      - 'docs/**'
      - 'img/**'
      - '_config.yml'
      - '_layouts/**'
      - '_includes/**'
      - '.github/workflows/build-site.yml'
  workflow_dispatch:

# Publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Single concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Generate the interactive report data (docs/data.js + data.json + meta.json)
      # BEFORE the Jekyll build so they are included in the published site.
      - name: Generate report data
        run: node docs/build-data.mjs "$(date +%d/%m/%Y)"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Build the WHOLE site with Jekyll (README -> home with the custom layout,
      # catalogues 0X.md -> .html, derived analyses, and docs/ copied as static).
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
