<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}">
<link rel="icon" type="image/png" href="{{ '/img/logo.png' | relative_url }}">
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f6f8fa; --text:#1f2328; --muted:#656d76;
    --border:#d0d7de; --accent:#1f9d63; --accent-soft:#e8f7ef; --link:#1a7f4b;
    --radius:10px; --maxw:1100px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
  a{color:var(--link);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Header */
  .site-header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  .site-header .bar{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;
    gap:14px;padding:12px 20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--text);font-size:1.02rem}
  .brand:hover{text-decoration:none}
  .brand img{height:30px;width:auto;display:block}
  .brand .sep{color:var(--border)}
  .brand .name{letter-spacing:-.01em}
  nav.top{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  nav.top a{color:var(--muted);font-size:.9rem;padding:6px 10px;border-radius:8px}
  nav.top a:hover{background:var(--accent-soft);color:var(--accent);text-decoration:none}
  nav.top a.cta{background:var(--accent);color:#fff}
  nav.top a.cta:hover{background:var(--link);color:#fff}

  /* Content */
  main{max-width:var(--maxw);margin:0 auto;padding:32px 20px 64px}
  .page-content > *:first-child{margin-top:0}
  h1,h2,h3,h4{line-height:1.25;letter-spacing:-.01em;margin:1.6em 0 .6em;font-weight:650}
  h1{font-size:2rem;margin-top:.2em}
  h2{font-size:1.45rem;padding-bottom:.3em;border-bottom:1px solid var(--border)}
  h3{font-size:1.18rem}
  p,li{color:#27313b}
  hr{border:none;border-top:1px solid var(--border);margin:2em 0}
  img{max-width:100%}
  code{background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;
    padding:.12em .4em;font-size:.86em;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  pre{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;overflow:auto}
  pre code{background:none;border:none;padding:0;font-size:.85rem}
  blockquote{margin:1.2em 0;padding:.6em 1em;border-left:4px solid var(--accent);
    background:var(--accent-soft);border-radius:0 8px 8px 0;color:#33414e}
  blockquote > *:first-child{margin-top:0}blockquote > *:last-child{margin-bottom:0}

  /* Tables (wide catalog tables scroll horizontally) */
  .page-content table{display:block;max-width:100%;overflow-x:auto;border-collapse:collapse;
    font-size:.86rem;margin:1.2em 0;white-space:nowrap}
  .page-content th,.page-content td{border:1px solid var(--border);padding:7px 11px;text-align:left}
  .page-content thead th{background:var(--bg-soft);font-weight:650}
  .page-content tbody tr:nth-child(even){background:#fbfcfd}
  .page-content tbody tr:hover{background:var(--accent-soft)}

  /* Mermaid */
  .mermaid{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px;overflow:auto;margin:1.2em 0}

  footer.site{border-top:1px solid var(--border);background:var(--bg-soft)}
  footer.site .inner{max-width:var(--maxw);margin:0 auto;padding:22px 20px;color:var(--muted);
    font-size:.85rem;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  footer.site a{color:var(--link)}
  @media(max-width:640px){.brand .name{display:none}main{padding:22px 14px 48px}}
</style>
</head>
<body>
  <header class="site-header">
    <div class="bar">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/img/logo.png' | relative_url }}" alt="olexya logo">
        <span class="sep">|</span>
        <span class="name">OSS Data Tools Landscape</span>
      </a>
      <nav class="top">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/09.licenses.html' | relative_url }}">Licenses</a>
        <a class="cta" href="{{ '/docs/' | relative_url }}">Interactive report</a>
        <a href="https://github.com/olexya/oss-data-tools-landscape" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <article class="page-content">
      {{ content }}
    </article>
  </main>

  <footer class="site">
    <div class="inner">
      <span>OSS Data Tools Landscape — open-source building blocks for a composable data platform.</span>
      <span>·</span>
      <a href="https://github.com/olexya/oss-data-tools-landscape">Repository</a>
      <a href="{{ '/docs/' | relative_url }}">Interactive report</a>
    </div>
  </footer>
</body>
</html>
